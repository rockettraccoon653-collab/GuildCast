name: Deploy Legal Pages

on:
  push:
    branches: ["main"]
    paths:
      - "legal-site/**"
      - ".github/workflows/deploy-legal-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: legal-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
